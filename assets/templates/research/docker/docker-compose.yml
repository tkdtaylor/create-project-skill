# docker-compose.yml — {{PROJECT_NAME}}
# Generated: {{DATE}}
#
# Uses the shared claude-project-research base image (managed by the create-project skill).
# The base image is built once and reused across all research projects.
# This project's workspace lives entirely in the named volume below.
#
# Usage:
#   docker compose run --rm research        — open an interactive shell
#   docker compose run --rm research <cmd>  — run a single command and exit
#
# First run: the entrypoint seeds the workspace from the host and installs
# Python deps from requirements.txt into /workspace/.venv automatically.
#
# Example commands inside the container:
#   pandoc sources/local/paper.pdf -o outputs/drafts/paper.md
#   python scripts/fetch_sources.py
#   pdftotext sources/local/report.pdf -

services:
  research:
    image: claude-project-research:latest
    volumes:
      # Named volume — this project's isolated, persistent workspace
      - workspace:/workspace
      # Host project root — read-only, used for first-run seeding only
      - type: bind
        source: ..
        target: /host
        read_only: true
      # Share host Claude Code settings with the container (read-only).
      # R6 ensures this file exists on the host before the compose file is written.
      - type: bind
        source: "${HOME}/.claude/settings.json"
        target: /home/developer/.claude/settings.json
        read_only: true
    working_dir: /workspace
    env_file:
      - ../.env
    stdin_open: true
    tty: true

volumes:
  workspace:
    # Explicit name avoids the compose-project-name prefix
    name: "{{PROJECT_NAME}}-workspace"
